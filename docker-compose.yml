version: '3.8'

services:
  backend:
    container_name: oil-shop-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: oil-shop-backend:latest
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-5002}
      DATA_DIR: /app/data
    volumes:
      - type: bind
        source: ${BACKEND_DATA_PATH:-/mnt/tank/docker-data/oil-shop/backend/data}
        target: /app/data
    expose:
      - "${BACKEND_PORT:-5002}"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:' + (process.env.PORT || 5002) + '/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - oil-shop-network

  frontend:
    container_name: oil-shop-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_ADMIN_USERNAME: ${VITE_ADMIN_USERNAME:-vijay}
        VITE_ADMIN_PASSWORD: ${VITE_ADMIN_PASSWORD:-vijay@oil#2026}
    image: oil-shop-frontend:latest
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-5002}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-10012}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - oil-shop-network

networks:
  oil-shop-network:
    driver: bridge
